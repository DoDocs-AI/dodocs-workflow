<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Workspace OS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- Sidebar (always visible) -->
  <aside class="sidebar">
    <div class="sidebar-logo"><span>⚡</span> Workspace OS</div>

    <div class="sidebar-section">
      <div class="sidebar-label">Workspaces</div>
      <div id="workspace-chips"></div>
    </div>

    <button class="run-btn" id="run-btn" onclick="runSupervisor()">
      <div class="spinner"></div>
      <span class="btn-label">Run Supervisor</span>
    </button>

    <div class="sidebar-stats">
      <div class="stat"><span>Total projects</span><span class="stat-val" id="stat-total">0</span></div>
      <div class="stat"><span>Active</span><span class="stat-val" id="stat-active">0</span></div>
      <div class="stat"><span>Pending tasks</span><span class="stat-val" id="stat-pending">0</span></div>
      <div class="stat"><span>Blocked</span><span class="stat-val" id="stat-blocked">0</span></div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main">

    <!-- ── List View ─────────────────────────────────────── -->
    <div id="list-view">
      <div class="topbar">
        <h1>Projects <span class="refresh-dot" title="Auto-refresh every 10s"></span></h1>
        <div class="topbar-actions">
          <button class="btn btn-primary" onclick="openNewProjectModal()">+ New Project</button>
        </div>
      </div>

      <div class="blocked-banner" id="blocked-banner">
        <h3>🚫 Blocked — needs your attention</h3>
        <div id="blocked-items"></div>
      </div>

      <div class="projects-grid" id="projects-grid">
        <div class="empty-state"><h3>Loading…</h3><p>Fetching registry</p></div>
      </div>
    </div>

    <!-- ── Detail View ───────────────────────────────────── -->
    <div id="detail-view" style="display:none">

      <!-- Top bar -->
      <div class="detail-topbar">
        <button class="btn" onclick="closeDetail()">← Back</button>
        <div class="detail-title-wrap">
          <span class="detail-name" id="detail-name"></span>
          <div class="detail-meta" id="detail-meta"></div>
        </div>
        <div class="detail-phase-wrap">
          <label class="info-label" style="margin-right:6px">Phase</label>
          <select id="detail-phase-select" class="form-select" onchange="updatePhase()">
            <option value="ideation">ideation</option>
            <option value="planning">planning</option>
            <option value="ready">ready</option>
            <option value="in_progress">in progress</option>
            <option value="development">development</option>
            <option value="review">review</option>
            <option value="done">done</option>
            <option value="paused">paused</option>
          </select>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="overview"  onclick="switchTab('overview')">Overview</button>
        <button class="tab-btn"        data-tab="tasks"     onclick="switchTab('tasks')">Tasks <span class="tab-count" id="tab-count-tasks"></span></button>
        <button class="tab-btn"        data-tab="docs"      onclick="switchTab('docs')">Documentation</button>
        <button class="tab-btn"        data-tab="sources"   onclick="switchTab('sources')">Sources</button>
        <button class="tab-btn"        data-tab="session"   onclick="switchTab('session')">Session</button>
      </div>

      <!-- Tab contents -->
      <div id="tab-overview" class="tab-content"></div>
      <div id="tab-tasks"    class="tab-content" style="display:none"></div>
      <div id="tab-docs"     class="tab-content" style="display:none"></div>
      <div id="tab-sources"  class="tab-content" style="display:none"></div>
      <div id="tab-session"  class="tab-content" style="display:none"></div>

    </div><!-- /detail-view -->

  </main>
</div>

<!-- New Project Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>New Project</h2>
    <div class="field">
      <label>Name *</label>
      <input id="p-name" type="text" placeholder="my-awesome-project" />
    </div>
    <div class="field">
      <label>Workspace</label>
      <select id="p-workspace">
        <option value="personal">personal</option>
        <option value="corporate">corporate</option>
      </select>
    </div>
    <div class="field">
      <label>Type</label>
      <select id="p-type">
        <option value="software">software</option>
        <option value="research">research</option>
        <option value="content">content</option>
        <option value="brainstorm">brainstorm</option>
        <option value="devops">devops</option>
        <option value="design">design</option>
      </select>
    </div>
    <div class="field">
      <label>Phase</label>
      <select id="p-phase">
        <option value="ideation">ideation</option>
        <option value="planning">planning</option>
        <option value="ready">ready</option>
        <option value="in_progress">in progress</option>
        <option value="development">development</option>
        <option value="review">review</option>
        <option value="done">done</option>
        <option value="paused">paused</option>
      </select>
    </div>
    <div class="field">
      <label>Path</label>
      <input id="p-path" type="text" placeholder="/absolute/path/to/project" />
    </div>
    <div class="field">
      <label>Description</label>
      <textarea id="p-desc" placeholder="Brief description…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitNewProject()">Create Project</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
